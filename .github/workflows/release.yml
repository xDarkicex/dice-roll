name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: apple-darwin
            odin_url: https://github.com/odin-lang/Odin/releases/download/dev-2026-05/odin-macos-amd64-dev-2026-05.tar.gz
          - os: ubuntu-latest
            target: unknown-linux
            odin_url: https://github.com/odin-lang/Odin/releases/download/dev-2026-05/odin-linux-amd64-dev-2026-05.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Odin
        run: |
          curl -sL "${{ matrix.odin_url }}" -o odin.tar.gz
          tar -xzf odin.tar.gz
        shell: bash

      - name: Build
        run: |
          ODIN_DIR=$(ls -d odin-* 2>/dev/null | head -1)
          ./$ODIN_DIR/odin build . -file -out:diceroll

      - name: Package
        run: tar -czvf diceroll-${{ matrix.target }}.tar.gz diceroll

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: diceroll-*.tar.gz

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/homebrew-diceroll
          path: homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Compute SHAs
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NUM=${VERSION#v}
          curl -sL https://github.com/xDarkicex/dice-roll/releases/download/v${VERSION_NUM}/diceroll-apple-darwin.tar.gz -o diceroll-apple-darwin.tar.gz
          curl -sL https://github.com/xDarkicex/dice-roll/releases/download/v${VERSION_NUM}/diceroll-unknown-linux.tar.gz -o diceroll-unknown-linux.tar.gz
          SHA_MAC=$(shasum -a 256 diceroll-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_LINUX=$(shasum -a 256 diceroll-unknown-linux.tar.gz | cut -d' ' -f1)
          echo "SHA_MAC=$SHA_MAC" >> $GITHUB_ENV
          echo "SHA_LINUX=$SHA_LINUX" >> $GITHUB_ENV
          echo "VERSION_NUM=$VERSION_NUM" >> $GITHUB_ENV

      - name: Create formula
        env:
          VERSION_NUM: ${{ env.VERSION_NUM }}
          SHA_MAC: ${{ env.SHA_MAC }}
          SHA_LINUX: ${{ env.SHA_LINUX }}
        run: |
          cat > homebrew-tap/Formula/diceroll.rb << RUBY
          class Diceroll < Formula
            desc "Unix dice roller for tabletop use"
            homepage "https://github.com/xDarkicex/dice-roll"
            license "MIT"
            version "${VERSION_NUM}"

            on_macos do
              url "https://github.com/xDarkicex/dice-roll/releases/download/v${VERSION_NUM}/diceroll-apple-darwin.tar.gz"
              sha256 "${SHA_MAC}"
            end

            on_linux do
              url "https://github.com/xDarkicex/dice-roll/releases/download/v${VERSION_NUM}/diceroll-unknown-linux.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "diceroll"
            end
          end
          RUBY

      - name: Push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Formula/diceroll.rb
          git commit -m "Update diceroll to v${{ github.ref_name }}"
          git push